<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ProClip Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <div class="hero-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="auth-card glass reveal active">
            <div class="auth-header">
                <a href="index.html" style="text-decoration: none; display: inline-block; margin-bottom: 20px;">
                    <div class="logo">
                        <img src="logo.png" alt="ProClip Studio" class="nav-logo-img">
                        <span>ProClip Studio</span>
                    </div>
                </a>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Log in to manage your clips and subscription.</p>
            </div>

            <div id="error-msg" class="error-message" style="display: none;"></div>

            <form id="auth-form">
                <div class="form-group" id="name-group" style="display: none;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn" id="google-login">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>

            <div class="auth-footer">
                <span id="toggle-text">Don't have an account?</span>
                <a href="signup.html" id="auth-toggle">Sign Up</a>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
