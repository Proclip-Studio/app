<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Proclip Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <style>
        /* ====================== BASE ====================== */
        :root {
            --primary: #00e5ff;
            --secondary: #7c4dff;
            --bg: #0a0b12;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.07);
            --text: #ffffff;
            --muted: #64748b;
            --success: #2ed573;
            --danger: #ff4757;
            --warning: #ffa502;
            --gold: #ffd700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ====================== NAV ====================== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 64px;
            background: rgba(10, 11, 18, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .nav-logo img {
            height: 32px;
            width: 32px;
            object-fit: contain;
            border-radius: 8px;
        }
        .nav-logo span {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
        }
        .admin-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--primary);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 20px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-link-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .nav-link-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
        .sign-out-btn {
            background: rgba(255, 71, 87, 0.08);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.2);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .sign-out-btn:hover { background: rgba(255, 71, 87, 0.15); }

        /* ====================== LAYOUT ====================== */
        .page {
            padding: 88px 32px 48px;
            max-width: 1280px;
            margin: 0 auto;
        }
        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
        }
        .page-header p {
            color: var(--muted);
            margin-top: 4px;
            font-size: 0.95rem;
        }

        /* ====================== STATS ====================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, border-color 0.25s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 229, 255, 0.25);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }
        .stat-icon {
            position: absolute;
            top: 18px; right: 18px;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.07);
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
        }

        /* ====================== TOOLBAR ====================== */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }
        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 380px;
        }
        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.85rem;
        }
        .search-input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .search-input:focus { outline: none; border-color: rgba(0, 229, 255, 0.4); }
        .search-input::placeholder { color: var(--muted); }
        .refresh-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .refresh-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }

        /* ====================== TABLE ====================== */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid var(--border);
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.025); }
        td {
            padding: 14px 16px;
            font-size: 0.88rem;
            vertical-align: middle;
        }
        .user-name { font-weight: 600; font-size: 0.9rem; }
        .user-email { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

        /* ====================== BADGES ====================== */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .badge-admin { background: rgba(0, 229, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 229, 255, 0.2); }
        .badge-user { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
        .badge-premium { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.2); }
        .badge-free { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
        .badge-active { background: rgba(46, 213, 115, 0.1); color: var(--success); border: 1px solid rgba(46, 213, 115, 0.2); }
        .badge-blocked { background: rgba(255, 71, 87, 0.1); color: var(--danger); border: 1px solid rgba(255, 71, 87, 0.2); }

        /* ====================== MODAL ====================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #0d0e16;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 28px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .close-x {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .close-x:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        .form-col { display: flex; flex-direction: column; gap: 6px; }
        .form-col.full { grid-column: 1 / -1; }
        .form-col label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-select, .form-date {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }
        .form-select:focus, .form-date:focus {
            outline: none;
            border-color: rgba(0, 229, 255, 0.5);
        }
        .form-date::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), #0091ea);
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .save-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .danger-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 71, 87, 0.15);
        }
        .danger-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--danger);
            margin-bottom: 12px;
        }
        .danger-actions { display: flex; flex-direction: column; gap: 8px; }
        .action-btn {
            width: 100%;
            padding: 10px 16px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-warn { background: rgba(255, 165, 2, 0.08); color: var(--warning); border: 1px solid rgba(255, 165, 2, 0.2); }
        .btn-warn:hover { background: rgba(255, 165, 2, 0.15); }
        .btn-red { background: rgba(255, 71, 87, 0.08); color: var(--danger); border: 1px solid rgba(255, 71, 87, 0.2); margin-top: 4px; }
        .btn-red:hover { background: rgba(255, 71, 87, 0.15); }

        /* ====================== SPINNER ====================== */
        #loading-overlay {
            position: fixed; inset: 0;
            background: rgba(10, 11, 18, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(0, 229, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .page { padding: 80px 16px 32px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-logo">
            <img src="logo.png" alt="Proclip Studio">
            <span>Proclip Studio</span>
            <span class="admin-badge">ADMIN</span>
        </a>
        <div class="nav-right">
            <a href="dashboard.html" class="nav-link-btn">
                <i class="fa-solid fa-arrow-left" style="font-size: 0.8rem;"></i> User Dashboard
            </a>
            <button id="logout-btn" class="sign-out-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
        </div>
    </nav>

    <!-- Page -->
    <div class="page">
        <div class="page-header">
            <h1>Admin Panel</h1>
            <p>Manage users, subscriptions, and platform security</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-users stat-icon"></i>
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="stat-total-users">—</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-user-check stat-icon"></i>
                <div class="stat-label">Active Users</div>
                <div class="stat-value" id="stat-active-users">—</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-crown stat-icon" style="color: rgba(255,215,0,0.2);"></i>
                <div class="stat-label">Premium Users</div>
                <div class="stat-value" id="stat-premium-users">—</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-download stat-icon"></i>
                <div class="stat-label">Clips Exported</div>
                <div class="stat-value" id="stat-total-exports">—</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-upload stat-icon"></i>
                <div class="stat-label">Clips Uploaded</div>
                <div class="stat-value" id="stat-total-uploads">—</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search by name or email...">
            </div>
            <div style="display: flex; gap: 8px;">
                <select id="filter-plan" class="refresh-btn" style="cursor: pointer;">
                    <option value="all">All Plans</option>
                    <option value="free">Free</option>
                    <option value="premium">Premium</option>
                </select>
                <select id="filter-status" class="refresh-btn" style="cursor: pointer;">
                    <option value="all">All Status</option>
                    <option value="active">Active</option>
                    <option value="blocked">Blocked</option>
                </select>
                <button id="refresh-btn" class="refresh-btn">
                    <i class="fa-solid fa-rotate-right"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Role</th>
                        <th>Plan</th>
                        <th>Status</th>
                        <th>Exports</th>
                        <th>Uploads</th>
                        <th>Expiry</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr><td colspan="8" style="text-align:center; padding: 48px; color: var(--muted);">
                        <i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px;"></i> Loading users...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-top">
                <div class="modal-title" id="modal-user-name">Edit User</div>
                <button class="close-x" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <input type="hidden" id="edit-uid">

            <div class="form-row">
                <div class="form-col">
                    <label>Role</label>
                    <select id="edit-role" class="form-select">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>Account Status</label>
                    <select id="edit-is-active" class="form-select">
                        <option value="true">Active</option>
                        <option value="false">Blocked</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>Subscription</label>
                    <select id="edit-sub-status" class="form-select" onchange="handleSubChange(this.value)">
                        <option value="free">Free</option>
                        <option value="premium">Premium</option>
                    </select>
                </div>
                <div class="form-col" id="plan-type-col">
                    <label>Plan Type</label>
                    <select id="edit-plan" class="form-select" onchange="handlePlanChange(this.value)">
                        <option value="">None</option>
                        <option value="weekly">Weekly (+7 days)</option>
                        <option value="monthly">Monthly (+30 days)</option>
                        <option value="yearly">Yearly (+365 days)</option>
                    </select>
                </div>
                <div class="form-col full">
                    <label>Expiry Date (blank = no expiry)</label>
                    <input type="date" id="edit-expiry" class="form-date">
                </div>
            </div>

            <button id="save-user-btn" class="save-btn">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>

            <div class="danger-section">
                <div class="danger-title"><i class="fa-solid fa-shield-halved"></i> Security Actions</div>
                <div class="danger-actions">
                    <button id="reset-android-btn" class="action-btn btn-warn">
                        <i class="fa-brands fa-android"></i> Reset Android Device Binding
                    </button>
                    <button id="reset-extension-btn" class="action-btn btn-warn">
                        <i class="fa-solid fa-puzzle-piece"></i> Reset Extension Device Binding
                    </button>
                    <button id="delete-user-btn" class="action-btn btn-red">
                        <i class="fa-solid fa-trash"></i> Delete Account Permanently
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
